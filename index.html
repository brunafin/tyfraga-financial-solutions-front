    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(63, 27, 76, 0.8);
      }

      #initial-loader .initial-loader-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background-color: #ffffff;
        padding: 0.625rem;
      }

      #initial-loader svg {
        width: 3.5rem;
        height: 3.5rem;
        animation: initial-loader-spin 1s linear infinite;
      }

      @keyframes initial-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
